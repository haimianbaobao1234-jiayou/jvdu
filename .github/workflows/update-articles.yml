name: 更新文章

# 每天 UTC 零点运行（北京时间早上 8 点）
on:
  schedule:
    - cron: '0 0 * * *'
  # 允许手动触发
  workflow_dispatch:

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装依赖
        run: npm ci

      - name: 抓取文章并翻译
        run: npm run fetch

      - name: 构建前端
        run: npm run build

      - name: 提交文章数据更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/articles.json public/data/articles.json
          git diff --staged --quiet || git commit -m "📰 自动更新文章 $(date +%Y-%m-%d)"
          git push

      - name: 部署到 GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          artifact-name: github-pages
          path: dist
